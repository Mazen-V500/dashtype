<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashType - Redirect</title>
    <script>
        const host = window.location.hostname || "";
        const isGitHubPages = host.toLowerCase().endsWith("github.io");
        const pathParts = (window.location.pathname || "/").split("/").filter(Boolean);
        const basePath = pathParts.length && !pathParts[0].includes(".") ? `/${pathParts[0]}/` : "/";
        const isLocalPreview = window.location.protocol === "file:" || host === "localhost" || host === "127.0.0.1" || host === "::1";
        const target = isLocalPreview ? "./pages/single/index.html" : (isGitHubPages ? `${basePath}pages/single/index.html` : "/single");
        window.location.replace(target);
    </script>
</head>
<body>
    <p>Redirecting to Single mode...</p>
</body>
</html>
