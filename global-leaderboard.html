<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DashType - السجل العالمي</title>
	<link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="photo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="photo/favicon-16.png">
    <link rel="apple-touch-icon" href="photo/favicon-64.png">
	<style>
		.leaderboard-container {
			display: grid;
			gap: 16px;
		}

		.mode-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .leaderboard-card {
            background: var(--glass-surface);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            backdrop-filter: blur(16px) saturate(140%);
        }

        .leaderboard-header {
            background: linear-gradient(120deg, var(--accent-a), var(--accent-b));
            color: #07203a;
            padding: 12px 16px;
            font-weight: 800;
            text-align: center;
            font-size: 18px;
        }

        .rank-medal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
        }

        .rank-1 { background: #FFD700; color: #000; box-shadow: 0 0 10px #FFD700; }
        .rank-2 { background: #C0C0C0; color: #000; }
        .rank-3 { background: #CD7F32; color: #000; }
        .rank-other { background: var(--glass-surface-strong); }

        .loading-state {
            grid-column: 1 / -1;
        }
	</style>
</head>
<body>

                <span class="logo-beta" id="betaLabel">بيتا</span>
            </a>
		</div>
	</header>

	<main class="game-card" id="historyScreen">
        <section class="game-top">

                <h1 id="pageTitle" class="history-title">السجل العالمي</h1>
                <p class="subtitle" id="pageSubtitle">ترتيب السرعة حسب الأنماط: الفردي، الثلاثي، المتتابع، والفقرة</p>
            </div>
            <div class="history-back-wrap">
                    <a href="index.html" class="inline-link">
                    <button id="backBtn" class="filter-btn active btn-icon history-back-btn"><span class="icon icon-back" aria-hidden="true"></span><span id="backBtnText">العودة للرئيسية</span></button>
                </a>
            </div>
        </section>

        <div class="mode-sections" id="leaderboardContent">

        </div>
	</main>

    <footer class="page-footer">
        <div class="footer-credits">
            <div class="footer-person">
                <div id="mazenNameTxt" class="footer-person-name">مازن</div>
                <div class="footer-links">
                    <a href="https://x.com/mazen_v500" class="footer-link" target="_blank" rel="noopener" title="X/Twitter" aria-label="X/Twitter"><span class="icon icon-x" aria-hidden="true"></span></a>
                    <a href="https://github.com/mazen-v500" class="footer-link" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub"><span class="icon icon-github" aria-hidden="true"></span></a>
                    <a href="https://t.me/mazen_v500" class="footer-link" target="_blank" rel="noopener" title="Telegram" aria-label="Telegram"><span class="icon icon-telegram" aria-hidden="true"></span></a>
                </div>
            </div>
            <div class="footer-person">
                <div id="ahmedNameTxt" class="footer-person-name">أحمد</div>
                <div class="footer-links">
                    <a href="https://x.com/ko_wll" class="footer-link" target="_blank" rel="noopener" title="X/Twitter" aria-label="X/Twitter"><span class="icon icon-x" aria-hidden="true"></span></a>
                    <a href="https://instagram.com/zs_us" class="footer-link" target="_blank" rel="noopener" title="Instagram" aria-label="Instagram"><span class="icon icon-instagram" aria-hidden="true"></span></a>

		<p class="footer-meta">

            <span class="footer-meta-item"><span id="contactLabel" class="footer-contact-label">للتواصل معنا</span> <a class="footer-contact" href="mailto:contact@dashtype.tech">contact@dashtype.tech</a></span>
            <span class="footer-meta-item"><span id="versionLabel" class="footer-contact-label">الإصدار</span> <span class="footer-version">0.6.005</span></span>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
		import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

		const firebaseConfig = {
			apiKey: "AIzaSyABT9cJ3H2e1YaljPhmFb8dgXfaV7cZEQs",
			authDomain: "dashtype-9855c.firebaseapp.com",
			projectId: "dashtype-9855c",
			storageBucket: "dashtype-9855c.firebasestorage.app",
			messagingSenderId: "758504188835",
			appId: "1:758504188835:web:a75d6f9452f09a067f0816",
			databaseURL: "https://dashtype-9855c-default-rtdb.firebaseio.com"
		};

		const app = initializeApp(firebaseConfig);
		const db = getDatabase(app);

        const leaderboardContent = document.getElementById('leaderboardContent');

        let currentLanguage = "ar";

        const textMap = {
            ar: {
                pageTitle: "السجل العالمي",
                pageSubtitle: "ترتيب السرعة حسب الأنماط: الفردي، الثلاثي، المتتابع، والفقرة",
                backBtn: "العودة للرئيسية",
                loading: "جاري جلب أسرع الأوقات العالمية...",
                noData: "لا توجد بيانات متاحة حالياً.",
                unknownPlayer: "لاعب مجهول",
                statsHeader: "إحصائيات: أكثر الكلمات كتابةً عالمياً",
                times: "مرة",
                singleMode: "الفردي",
                tripleMode: "الثلاثي",
                seqMode: "المتتابع",
                paragraphMode: "الفقرة",
                noRounds: "لا توجد جولات بعد",
                sec: "ث",
                rank: "المركز",
                player: "اللاعب",
                time: "الوقت",
                date: "التاريخ",
                errorLoad: "حدث خطأ أثناء الاتصال بقاعدة البيانات. تأكد من اتصالك بالإنترنت.",
                mazenNameTxt: "مازن",
                ahmedNameTxt: "أحمد",
                contactLabel: "للتواصل معنا",
                versionLabel: "الإصدار",
                betaLabel: "بيتا"
            },
            en: {
                pageTitle: "Global Leaderboard",
                pageSubtitle: "Speed ranking by modes: Single, Triple, Sequential, and Paragraph",
                backBtn: "Back to Home",
                loading: "Fetching fastest global times...",
                noData: "No data available currently.",
                unknownPlayer: "Unknown Player",
                statsHeader: "Stats: Most Typed Words Globally",
                times: "times",
                singleMode: "Single",
                tripleMode: "Triple",
                seqMode: "Sequential",
                paragraphMode: "Paragraph",
                noRounds: "No rounds yet",
                sec: "s",
                rank: "Rank",
                player: "Player",
                time: "Time",
                date: "Date",
                errorLoad: "Error trying to connect to the database. Make sure you are connected to the internet.",
                mazenNameTxt: "Mazen",
                ahmedNameTxt: "Ahmed",
                contactLabel: "Contact us",
                versionLabel: "Version",
                betaLabel: "Beta"
            }
        };

        function t(key) {
            return textMap[currentLanguage][key];
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function decodeLatin1AsUtf8(value) {
            const bytes = new Uint8Array(Array.from(String(value ?? ""), (ch) => ch.charCodeAt(0) & 0xff));
            return new TextDecoder("utf-8").decode(bytes);
        }

        function repairPossibleMojibake(value) {
            let text = String(value ?? "").trim();
            if (!text) {
                return "";
            }

            const looksCorrupted = /[ØÙÃÂÐÑ]/.test(text) || /[\u00C0-\u00FF]{2,}/.test(text);
            if (!looksCorrupted) {
                return text;
            }

            try {
                for (let i = 0; i < 2; i += 1) {
                    const decoded = decodeLatin1AsUtf8(text).trim();
                    if (!decoded || decoded === text) {
                        break;
                    }
                    text = decoded;
                    if (/[\u0600-\u06FF]/.test(text)) {
                        break;
                    }
                }
            } catch (_error) {
                // Keep original text if decoding fails.
            }

            return text;
        }

        function normalizeDisplayName(value) {
            const normalized = repairPossibleMojibake(value)
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, "")
                .trim()
                .replace(/\s+/g, " ")
                .normalize("NFC");
            return normalized || t('unknownPlayer');
        }

        function normalizeShortId(value) {
            return String(value ?? "").trim().replace(/[^a-zA-Z0-9]/g, "").slice(0, 12);
        }

        function normalizeStatWord(value) {
            const repaired = repairPossibleMojibake(value)
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, "")
                .trim()
                .replace(/\s+/g, " ")
                .normalize("NFC");

            if (!repaired) {
                return "";
            }

            const hasArabic = /[\u0600-\u06FF]/.test(repaired);
            const hasEnglish = /[A-Za-z]/.test(repaired);
            const hasBoxDrawing = /[\u2500-\u257F\u2580-\u259F]/.test(repaired);
            const hasGarbleMarkers = /[╬╣╢╔╗╝┘┌┐]/.test(repaired);

            if (hasBoxDrawing || hasGarbleMarkers) {
                return "";
            }

            if (!hasArabic && !hasEnglish) {
                return "";
            }

            return repaired;
        }

        function resolveWordmarkSrc(colorMode, lang) {
            const normalizedLang = (lang || "ar").toLowerCase();
            const isArabic = normalizedLang === "ar";
            if (colorMode === "light") {
                return isArabic ? "photo/dashtype%20black%20Wordmark%20ar.png" : "photo/dashtype%20black%20Wordmark.png";
            }
            return isArabic ? "photo/dashtype%20White%20Wordmark%20ar.png" : "photo/dashtype%20white%20Wordmark.png";
        }

        async function loadGlobalLeaderboard() {
            try {
                const roundsRef = ref(db, 'publicRounds');
                const snapshot = await get(roundsRef);
                
                if (!snapshot.exists()) {
                    leaderboardContent.innerHTML = `<div class="loading-state">${t('noData')}</div>`;
                    return;
                }

                const data = snapshot.val();
                let allRounds = [];
                let wordCounts = {};
                const defaultName = t('unknownPlayer');

                // Extract all rounds from the public index
                Object.keys(data).forEach(roundId => {
                    const r = data[roundId];
                    if (!r || typeof r.mode !== 'string' || typeof r.timeTaken !== 'number') {
                        return;
                    }

                    const displayName = normalizeDisplayName(r.playerName);
                    const shortId = normalizeShortId(r.shortId);

                    allRounds.push({
                        playerName: displayName || defaultName,
                        shortId,
                        timeTaken: parseFloat(r.timeTaken),
                        mode: r.mode,
                        word: r.word,
                        date: r.timestamp || 0
                    });

                    // Count words for global stats
                    if (r.word) {
                        const words = String(r.word).split(' ');
                        words.forEach(w => {
                            const cleanWord = normalizeStatWord(w);
                            if (!cleanWord) {
                                return;
                            }
                            if (wordCounts[cleanWord]) {
                                wordCounts[cleanWord]++;
                            } else {
                                wordCounts[cleanWord] = 1;
                            }
                        });
                    }
                });

                // Prepare most typed words
                const sortedWords = Object.keys(wordCounts).sort((a, b) => wordCounts[b] - wordCounts[a]).slice(0, 5);
                let wordsHtml = '';
                if (sortedWords.length > 0) {
                    wordsHtml = `
                    <div class="leaderboard-card" style="grid-column: 1 / -1; margin-bottom: 20px;">
                        <div class="leaderboard-header" style="background: linear-gradient(120deg, #10b981, #059669); color: white;">${t('statsHeader')}</div>
                        <div style="padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                            ${sortedWords.map((w, i) => `<span style="background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: var(--radius-pill); font-weight: bold;">${i+1}. ${escapeHtml(w)} <span style="font-size: 11px; opacity: 0.7;">(${wordCounts[w]} ${t('times')})</span></span>`).join('')}
                        </div>
                    </div>
                    `;
                }

                // Group by mode
                const modes = {
                    'single': { title: t('singleMode'), rounds: [] },
                    'triple': { title: t('tripleMode'), rounds: [] },
                    'seq': { title: t('seqMode'), rounds: [] },
                    'paragraph': { title: t('paragraphMode'), rounds: [] }
                };

                allRounds.forEach(r => {
                    if (modes[r.mode]) {
                        modes[r.mode].rounds.push(r);
                    }
                });

                leaderboardContent.innerHTML = wordsHtml || '';

                // Build UI for each mode
                ['single', 'triple', 'seq', 'paragraph'].forEach(modeKey => {
                    const modeData = modes[modeKey];
                    // Sort ascending by time
                    modeData.rounds.sort((a, b) => a.timeTaken - b.timeTaken);
                    
                    // Take top 10 unique best times
                    let top10 = [];
                    let seenNames = new Set();
                    for(let i = 0; i < modeData.rounds.length; i++) {
                        let r = modeData.rounds[i];
                        if(!seenNames.has(r.playerName + r.shortId + r.timeTaken)) {
                            top10.push(r);
                            seenNames.add(r.playerName + r.shortId + r.timeTaken);
                        }
                        if(top10.length >= 10) break; 
                    }

                    let tableRows = top10.length === 0 ? 
                        `<tr><td colspan="4" style="text-align: center; opacity: 0.7;">${t('noRounds')}</td></tr>` : '';

                    top10.forEach((r, index) => {
                        const rank = index + 1;
                        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                        const playerNameSafe = escapeHtml(r.playerName);
                        const shortIdSafe = escapeHtml(r.shortId);
                        const fullTitle = shortIdSafe ? `${playerNameSafe} #${shortIdSafe}` : playerNameSafe;
                        const shortIdTag = shortIdSafe
                            ? `<span style="font-size:10px; opacity:0.6; direction:ltr; unicode-bidi:isolate;"> #${shortIdSafe}</span>`
                            : "";
                        tableRows += `
                            <tr>
                                <td><div class="rank-medal ${rankClass}">${rank}</div></td>
                                <td style="font-weight: bold; color: var(--accent-b); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${fullTitle}"><span style="unicode-bidi:isolate;" dir="auto">${playerNameSafe}</span>${shortIdTag}</td>
                                <td style="font-family: monospace;">${r.timeTaken.toFixed(3)} ${t('sec')}</td>
                                <td style="opacity: 0.8; font-size: 11px;">${new Date(r.date).toLocaleDateString(currentLanguage === 'ar' ? 'ar-EG' : 'en-US')}</td>
                            </tr>
                        `;
                    });

                    const modeCard = `
                        <div class="leaderboard-card">
                            <div class="leaderboard-header">${modeData.title}</div>
                            <table class="history-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">${t('rank')}</th>
                                        <th>${t('player')}</th>
                                        <th>${t('time')}</th>
                                        <th>${t('date')}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRows}
                                </tbody>
                            </table>
                        </div>
                    `;
                    leaderboardContent.innerHTML += modeCard;
                });

            } catch (error) {
                console.error("Error loading global leaderboard:", error);
                leaderboardContent.innerHTML = `<div class="loading-state">${t('errorLoad')}</div>`;
            }
        }

        // Apply theme and language from localStorage if available
        try {
            const saved = JSON.parse(localStorage.getItem("typingGameState") || "{}");
            currentLanguage = typeof saved.currentLanguage === "string" ? saved.currentLanguage : "ar";
            
            // Translate static page elements
            document.documentElement.lang = currentLanguage;
            document.documentElement.dir = "rtl";
            document.title = currentLanguage === "ar" ? "DashType - السجل العالمي" : "DashType - Global Leaderboard";
            document.getElementById("pageTitle").textContent = t("pageTitle");
            document.getElementById("pageSubtitle").textContent = t("pageSubtitle");
            document.getElementById("backBtnText").textContent = t("backBtn");
            const mazenTxt = document.getElementById("mazenNameTxt");
            const ahmedTxt = document.getElementById("ahmedNameTxt");
            if (mazenTxt) mazenTxt.textContent = t("mazenNameTxt");
            if (ahmedTxt) ahmedTxt.textContent = t("ahmedNameTxt");
            const contactLabel = document.getElementById("contactLabel");
            if (contactLabel) contactLabel.textContent = t("contactLabel");
            const versionLabel = document.getElementById("versionLabel");
            if (versionLabel) versionLabel.textContent = t("versionLabel");
            const betaLabel = document.getElementById("betaLabel");
            if (betaLabel) betaLabel.textContent = t("betaLabel");
            const loadingEl = document.getElementById("loadingState");
            if (loadingEl) { loadingEl.textContent = t("loading"); }

            const theme = typeof saved.currentTheme === "string" ? saved.currentTheme : "ocean";
            const colorMode = typeof saved.currentColorMode === "string" ? saved.currentColorMode : "blur";
            document.documentElement.setAttribute("data-theme", theme);
            document.documentElement.setAttribute("data-color-mode", colorMode);
            
            const logoImg = document.getElementById("logoImg");
            if (logoImg) {
                logoImg.src = resolveWordmarkSrc(colorMode, currentLanguage);
            }
        } catch(e){}

        loadGlobalLeaderboard();
	</script>
</body>
