            grid-column: 1 / -1;

        .leaderboard-toolbar {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;

        .lb-range-btn {
            border: 1px solid var(--glass-border);
            background: var(--glass-surface-soft);
            color: var(--ink);
            border-radius: var(--radius-pill);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;

        .lb-range-btn.active {
            color: #07203a;
            border-color: transparent;
            background: linear-gradient(120deg, var(--accent-a), var(--accent-b));

        .lb-pager {

        function t(key) {
            return textMap[currentLanguage][key];
        }

        function decodeLatin1AsUtf8(value) {
            const bytes = new Uint8Array(Array.from(String(value ?? ""), (ch) => ch.charCodeAt(0) & 0xff));
            return new TextDecoder("utf-8").decode(bytes);
        }

        function repairPossibleMojibake(value) {
            let text = String(value ?? "").trim();
            if (!text) {
                return "";
            }

            const looksCorrupted = /[ØÙÃÂÐÑ]/.test(text) || /[\u00C0-\u00FF]{2,}/.test(text);
            if (!looksCorrupted) {
                return text;
            }

            try {
                for (let i = 0; i < 2; i += 1) {
                    const decoded = decodeLatin1AsUtf8(text).trim();
                    if (!decoded || decoded === text) {
                        break;
                    }
                    text = decoded;
                    if (/[\u0600-\u06FF]/.test(text)) {
                        break;
                    }
                }
            } catch (_error) {
                // Keep original text if decoding fails.
            }

            return text;
        }

        function normalizeDisplayName(value) {
            const normalized = repairPossibleMojibake(value)
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, "")
                .trim()
                .replace(/\s+/g, " ")
                .normalize("NFC");
            return normalized || t('unknownPlayer');
        }

        function normalizeShortId(value) {
            return String(value ?? "").trim().replace(/[^a-zA-Z0-9]/g, "").slice(0, 12);
        }

        function normalizeStatWord(value) {
            const repaired = repairPossibleMojibake(value)
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, "")
                .trim()
                .replace(/\s+/g, " ")
                .normalize("NFC");

            if (!repaired) {
                return "";
            }

            const hasArabic = /[\u0600-\u06FF]/.test(repaired);
            const hasEnglish = /[A-Za-z]/.test(repaired);
            const hasBoxDrawing = /[\u2500-\u257F\u2580-\u259F]/.test(repaired);
            const hasGarbleMarkers = /[╬╣╢╔╗╝┘┌┐]/.test(repaired);

            if (hasBoxDrawing || hasGarbleMarkers) {
                return "";
            }

            if (!hasArabic && !hasEnglish) {
                return "";
            }

            return repaired;
        }

        function getRangeStartTimestamp(rangeKey) {
            const now = new Date();
            const start = new Date(now);

            if (rangeKey === "today") {
                start.setHours(0, 0, 0, 0);
                return start.getTime();
            }

            if (rangeKey === "week") {
                const day = start.getDay() || 7;
                start.setDate(start.getDate() - (day - 1));
                start.setHours(0, 0, 0, 0);
                return start.getTime();
            }

            if (rangeKey === "month") {
                start.setDate(1);
                start.setHours(0, 0, 0, 0);
                return start.getTime();
            }

            return 0;
        }

        function getFilteredRoundsByRange() {
            const since = getRangeStartTimestamp(currentRange);
            if (!since) {
                return allRoundsCache.slice();
            }
            return allRoundsCache.filter((round) => Number(round.date || 0) >= since);
        }

        function buildModeRows(rounds, modeKey) {
            const modeRows = rounds
                .filter((round) => round.mode === modeKey)
                .sort((a, b) => a.timeTaken - b.timeTaken);

            const uniqueRows = [];
            const seen = new Set();
            modeRows.forEach((row) => {
                const key = `${row.playerName}|${row.shortId}|${row.timeTaken}`;
                if (seen.has(key)) return;
                seen.add(key);
                uniqueRows.push(row);
            });
            return uniqueRows;
        }

        function createHeaderCell(label, width) {
            const th = document.createElement("th");
            th.textContent = label;
            if (width) {
                th.style.width = width;
            }
            return th;
        }

        function createCard(title, options = {}) {
            const card = document.createElement("div");
            card.className = "leaderboard-card";
            if (options.fullWidth) {
                card.style.gridColumn = "1 / -1";
                card.style.marginBottom = "14px";
            }

            const header = document.createElement("div");
            header.className = "leaderboard-header";
            header.textContent = title;
            if (options.headerStyle) {
                Object.assign(header.style, options.headerStyle);
            }
            card.appendChild(header);

            return { card, header };
        }

        function renderLeaderboard() {
            const rounds = getFilteredRoundsByRange();
            const wordCounts = {};

            rounds.forEach((round) => {
                if (!round.word) return;
                String(round.word)
                    .split(" ")
                    .forEach((word) => {
                        const cleanWord = normalizeStatWord(word);
                        if (!cleanWord) return;
                        wordCounts[cleanWord] = (wordCounts[cleanWord] || 0) + 1;
                    });
            });

            const sortedWords = Object.keys(wordCounts)
                .sort((a, b) => wordCounts[b] - wordCounts[a])
                .slice(0, 5);

            leaderboardContent.textContent = "";

            const toolbar = document.createElement("div");
            toolbar.className = "leaderboard-toolbar";

            const filterLabel = document.createElement("span");
            filterLabel.style.fontSize = "12px";
            filterLabel.style.opacity = "0.82";
            filterLabel.textContent = t("filterLabel");
            toolbar.appendChild(filterLabel);

            [
                { key: "all", label: t("rangeAll") },
                { key: "today", label: t("rangeToday") },
                { key: "week", label: t("rangeWeek") },
                { key: "month", label: t("rangeMonth") }
            ].forEach((item) => {
                const btn = document.createElement("button");
                btn.className = `lb-range-btn ${currentRange === item.key ? "active" : ""}`;
                btn.dataset.range = item.key;
                btn.textContent = item.label;
                toolbar.appendChild(btn);
            });

            leaderboardContent.appendChild(toolbar);

            if (topLevelsCache.length) {
                const topLevelsCard = createCard(t("topLevelsHeader"), { fullWidth: true }).card;
                const table = document.createElement("table");
                table.className = "history-table";

                const thead = document.createElement("thead");
                const headRow = document.createElement("tr");
                headRow.append(
                    createHeaderCell(t("rank"), "50px"),
                    createHeaderCell(t("player")),
                    createHeaderCell(t("level"), "110px"),
                    createHeaderCell(t("points"), "140px")
                );
                thead.appendChild(headRow);

                const tbody = document.createElement("tbody");
                topLevelsCache.forEach((row, index) => {
                    const tr = document.createElement("tr");

                    const rankTd = document.createElement("td");
                    const rankBadge = document.createElement("div");
                    rankBadge.className = `rank-medal ${index === 0 ? "rank-1" : index === 1 ? "rank-2" : index === 2 ? "rank-3" : "rank-other"}`;
                    rankBadge.textContent = String(index + 1);
                    rankTd.appendChild(rankBadge);

                    const playerTd = document.createElement("td");
                    const playerSpan = document.createElement("span");
                    playerSpan.setAttribute("dir", "auto");
                    playerSpan.style.unicodeBidi = "isolate";
                    playerSpan.textContent = row.playerName;
                    playerTd.appendChild(playerSpan);
                    if (row.shortId) {
                        const shortIdSpan = document.createElement("span");
                        shortIdSpan.style.fontSize = "10px";
                        shortIdSpan.style.opacity = "0.6";
                        shortIdSpan.style.direction = "ltr";
                        shortIdSpan.style.unicodeBidi = "isolate";
                        shortIdSpan.textContent = ` #${row.shortId}`;
                        playerTd.appendChild(shortIdSpan);
                    }

                    const levelTd = document.createElement("td");
                    levelTd.textContent = String(row.level);

                    const pointsTd = document.createElement("td");
                    pointsTd.textContent = String(row.points);

                    tr.append(rankTd, playerTd, levelTd, pointsTd);
                    tbody.appendChild(tr);
                });

                table.append(thead, tbody);
                topLevelsCard.appendChild(table);
                leaderboardContent.appendChild(topLevelsCard);
            } else {
                const topLevelsCard = createCard(t("topLevelsHeader"), { fullWidth: true }).card;
                const noLevelState = document.createElement("div");
                noLevelState.className = "loading-state";
                noLevelState.style.padding = "14px";
                noLevelState.textContent = t("noTopLevels");
                topLevelsCard.appendChild(noLevelState);
                leaderboardContent.appendChild(topLevelsCard);
            }

            if (sortedWords.length > 0) {
                const wordsCard = createCard(t("statsHeader"), {
                    fullWidth: true,
                    headerStyle: {
                        background: "linear-gradient(120deg, #10b981, #059669)",
                        color: "white"
                    }
                }).card;

                const wordsWrap = document.createElement("div");
                wordsWrap.style.padding = "14px";
                wordsWrap.style.display = "flex";
                wordsWrap.style.flexWrap = "wrap";
                wordsWrap.style.gap = "10px";
                wordsWrap.style.justifyContent = "center";

                sortedWords.forEach((word, index) => {
                    const chip = document.createElement("span");
                    chip.style.background = "rgba(255,255,255,0.1)";
                    chip.style.padding = "8px 14px";
                    chip.style.borderRadius = "var(--radius-pill)";
                    chip.style.fontWeight = "bold";
                    chip.textContent = `${index + 1}. ${word}`;

                    const countSpan = document.createElement("span");
                    countSpan.style.fontSize = "11px";
                    countSpan.style.opacity = "0.72";
                    countSpan.textContent = ` (${wordCounts[word]} ${t("times")})`;
                    chip.appendChild(countSpan);

                    wordsWrap.appendChild(chip);
                });

                wordsCard.appendChild(wordsWrap);
                leaderboardContent.appendChild(wordsCard);
            }

            const modes = {
                single: t("singleMode"),
                triple: t("tripleMode"),
                seq: t("seqMode"),
                paragraph: t("paragraphMode")
            };

            let hasAnyRows = false;

            ["single", "triple", "seq", "paragraph"].forEach((modeKey) => {
                const rows = buildModeRows(rounds, modeKey);
                const totalPages = Math.max(1, Math.ceil(rows.length / LEADERBOARD_PAGE_SIZE));
                pageByMode[modeKey] = Math.min(totalPages, Math.max(1, pageByMode[modeKey] || 1));
                const page = pageByMode[modeKey];
                const start = (page - 1) * LEADERBOARD_PAGE_SIZE;
                const pageRows = rows.slice(start, start + LEADERBOARD_PAGE_SIZE);
                if (rows.length) {
                    hasAnyRows = true;
                }

                const modeCard = createCard(modes[modeKey]).card;
                const table = document.createElement("table");
                table.className = "history-table";

                const thead = document.createElement("thead");
                const headRow = document.createElement("tr");
                headRow.append(
                    createHeaderCell(t("rank"), "50px"),
                    createHeaderCell(t("player")),
                    createHeaderCell(t("time")),
                    createHeaderCell(t("date"))
                );
                thead.appendChild(headRow);

                const tbody = document.createElement("tbody");

                if (pageRows.length === 0) {
                    const emptyRow = document.createElement("tr");
                    const emptyTd = document.createElement("td");
                    emptyTd.colSpan = 4;
                    emptyTd.style.textAlign = "center";
                    emptyTd.style.opacity = "0.7";
                    emptyTd.textContent = t("noRounds");
                    emptyRow.appendChild(emptyTd);
                    tbody.appendChild(emptyRow);
                } else {
                    pageRows.forEach((row, idx) => {
                        const rank = start + idx + 1;
                        const rankClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "rank-other";

                        const tr = document.createElement("tr");

                        const rankTd = document.createElement("td");
                        const rankBadge = document.createElement("div");
                        rankBadge.className = `rank-medal ${rankClass}`;
                        rankBadge.textContent = String(rank);
                        rankTd.appendChild(rankBadge);

                        const playerTd = document.createElement("td");
                        playerTd.style.fontWeight = "bold";
                        playerTd.style.color = "var(--accent-b)";
                        playerTd.style.maxWidth = "150px";
                        playerTd.style.overflow = "hidden";
                        playerTd.style.textOverflow = "ellipsis";
                        playerTd.style.whiteSpace = "nowrap";
                        playerTd.title = row.shortId ? `${row.playerName} #${row.shortId}` : row.playerName;

                        const playerSpan = document.createElement("span");
                        playerSpan.setAttribute("dir", "auto");
                        playerSpan.style.unicodeBidi = "isolate";
                        playerSpan.textContent = row.playerName;
                        playerTd.appendChild(playerSpan);

                        if (row.shortId) {
                            const shortIdSpan = document.createElement("span");
                            shortIdSpan.style.fontSize = "10px";
                            shortIdSpan.style.opacity = "0.6";
                            shortIdSpan.style.direction = "ltr";
                            shortIdSpan.style.unicodeBidi = "isolate";
                            shortIdSpan.textContent = ` #${row.shortId}`;
                            playerTd.appendChild(shortIdSpan);
                        }

                        const timeTd = document.createElement("td");
                        timeTd.style.fontFamily = "monospace";
                        timeTd.textContent = `${row.timeTaken.toFixed(3)} ${t("sec")}`;

                        const dateTd = document.createElement("td");
                        dateTd.style.opacity = "0.8";
                        dateTd.style.fontSize = "11px";
                        dateTd.textContent = new Date(row.date).toLocaleDateString(currentLanguage === "ar" ? "ar-EG" : "en-US");

                        tr.append(rankTd, playerTd, timeTd, dateTd);
                        tbody.appendChild(tr);
                    });
                }

                table.append(thead, tbody);
                modeCard.appendChild(table);

                const pager = document.createElement("div");
                pager.className = "lb-pager";

                const prevBtn = document.createElement("button");
                prevBtn.className = "lb-page-btn";
                prevBtn.dataset.pageAction = "prev";
                prevBtn.dataset.mode = modeKey;
                prevBtn.disabled = page <= 1;
                prevBtn.textContent = t("prevPage");

                const pageLabel = document.createElement("span");
                pageLabel.style.fontSize = "12px";
                pageLabel.style.opacity = ".85";
                pageLabel.textContent = `${t("pageLabel")} ${page} / ${totalPages}`;

                const nextBtn = document.createElement("button");
                nextBtn.className = "lb-page-btn";
                nextBtn.dataset.pageAction = "next";
                nextBtn.dataset.mode = modeKey;
                nextBtn.disabled = page >= totalPages;
                nextBtn.textContent = t("nextPage");

                pager.append(prevBtn, pageLabel, nextBtn);
                modeCard.appendChild(pager);

                leaderboardContent.appendChild(modeCard);
            });

            if (!hasAnyRows) {
                const noData = document.createElement("div");
                noData.className = "loading-state";
                noData.textContent = t("noDataForFilter");
                leaderboardContent.appendChild(noData);
            }
        }

        async function loadGlobalLeaderboard() {
            try {
                const roundsQuery = query(
                    ref(db, 'publicRounds'),
                    orderByChild('timestamp'),
                    limitToLast(GLOBAL_LEADERBOARD_FETCH_LIMIT)
                );
                let snapshot;
                try {
                    snapshot = await get(roundsQuery);
                } catch (_error) {
                    try {
                        snapshot = await get(ref(db, 'publicRounds'));
                    } catch (_fallbackError) {
                        snapshot = null;
                    }
                }

                let usersSnapshot = null;
                try {
                    const usersQuery = query(
                        ref(db, 'users'),
                        orderByChild('profile/stats/level'),
                        limitToLast(180)
                    );
                    usersSnapshot = await get(usersQuery);
                } catch (_error) {
                    try {
                        usersSnapshot = await get(ref(db, 'users'));
                    } catch (_fallbackError) {
                        usersSnapshot = null;
                    }
                }
                
                const data = snapshot && snapshot.exists() ? (snapshot.val() || {}) : {};
                const rounds = [];
                const defaultName = t('unknownPlayer');

                // Extract all rounds from the public index
                Object.keys(data).forEach(roundId => {
                    const r = data[roundId];
                    const modeRaw = String(r?.mode || "").toLowerCase();
                    const normalizedMode = modeRaw === "sequential" ? "seq" : modeRaw;
                    const parsedTimeTaken = Number(r?.timeTaken);
                    if (!r || !normalizedMode || !Number.isFinite(parsedTimeTaken) || parsedTimeTaken <= 0) {
                        return;
                    }

                    if (!["single", "triple", "seq", "paragraph"].includes(normalizedMode)) {
                        return;
                    }

                    const displayName = normalizeDisplayName(r.playerName);
                    const shortId = normalizeShortId(r.shortId);

                    rounds.push({
                        playerName: displayName || defaultName,
                        shortId,
                        timeTaken: parsedTimeTaken,
                        mode: normalizedMode,
                        word: r.word,
                        date: r.timestamp || 0
                    });
                });

                const levels = [];
                if (usersSnapshot && usersSnapshot.exists()) {
                    const usersData = usersSnapshot.val();
                    Object.keys(usersData).forEach((uid) => {
                        const userNode = usersData[uid] || {};
                        const profile = userNode.profile || {};
                        const stats = profile.stats || {};
                        const level = Number(stats.level || 0);
                        const points = Number(stats.totalPoints || 0);
                        if (!Number.isFinite(level) || level <= 0) {
                            return;
                        }

                        const displayName = normalizeDisplayName(
                            profile.nickname ||
                            userNode.nickname ||
                            profile.displayName ||
                            userNode.displayName ||
                            t('unknownPlayer')
                        );
                        const shortId = normalizeShortId(profile.shortId || userNode.shortId || String(uid).slice(0, 6));
                        levels.push({
                            playerName: displayName,
                            shortId: shortId || String(uid).slice(0, 6),
                            level: Math.floor(level),
                            points: Math.floor(points)
                        });
                    });
                }

                topLevelsCache = levels
                    .sort((a, b) => (b.level - a.level) || (b.points - a.points))
                    .slice(0, 10);

                allRoundsCache = rounds;
                pageByMode.single = 1;
                pageByMode.triple = 1;
                pageByMode.seq = 1;
                pageByMode.paragraph = 1;
                renderLeaderboard();

                if (!rangeListenerBound) {
                    rangeListenerBound = true;
                    leaderboardContent.addEventListener("click", (event) => {
                        const rangeBtn = event.target.closest("[data-range]");
                        if (rangeBtn) {
                            currentRange = rangeBtn.getAttribute("data-range") || "all";
                            pageByMode.single = 1;
                            pageByMode.triple = 1;
                            pageByMode.seq = 1;
                            pageByMode.paragraph = 1;
                            renderLeaderboard();
                            return;
                        }

                        const pagerBtn = event.target.closest("[data-page-action][data-mode]");
                        if (!pagerBtn) return;
                        const mode = pagerBtn.getAttribute("data-mode");
                        const action = pagerBtn.getAttribute("data-page-action");
                        if (!mode || !pageByMode[mode]) return;
                        if (action === "next") pageByMode[mode] += 1;
                        if (action === "prev") pageByMode[mode] -= 1;
                        pageByMode[mode] = Math.max(1, pageByMode[mode]);
                        renderLeaderboard();
                    });
                }

            } catch (error) {
                console.error("Error loading global leaderboard:", error);
                leaderboardContent.textContent = "";
                const errorState = document.createElement("div");
                errorState.className = "loading-state";
                errorState.textContent = t("errorLoad");
                leaderboardContent.appendChild(errorState);
            }
        }

        // Apply theme and language from localStorage if available
        const saved = readTypingGameState();
        currentLanguage = typeof saved.currentLanguage === "string" ? saved.currentLanguage : "ar";

        // Translate static page elements
        document.documentElement.lang = currentLanguage;
        document.documentElement.dir = "rtl";
        document.title = currentLanguage === "ar" ? "DashType - السجل العالمي" : "DashType - Global Leaderboard";
        document.getElementById("pageTitle").textContent = t("pageTitle");
        document.getElementById("pageSubtitle").textContent = t("pageSubtitle");
        document.getElementById("backBtnText").textContent = t("backBtn");
        const mazenTxt = document.getElementById("mazenNameTxt");
        const ahmedTxt = document.getElementById("ahmedNameTxt");
        if (mazenTxt) mazenTxt.textContent = t("mazenNameTxt");
        if (ahmedTxt) ahmedTxt.textContent = t("ahmedNameTxt");
        const contactLabel = document.getElementById("contactLabel");
        if (contactLabel) contactLabel.textContent = t("contactLabel");
        const versionLabel = document.getElementById("versionLabel");
        if (versionLabel) versionLabel.textContent = t("versionLabel");
        const betaLabel = document.getElementById("betaLabel");
        if (betaLabel) betaLabel.textContent = t("betaLabel");
        const loadingEl = document.getElementById("loadingState");
        if (loadingEl) { loadingEl.textContent = t("loading"); }

        const theme = typeof saved.currentTheme === "string" ? saved.currentTheme : "ocean";
        const colorMode = typeof saved.currentColorMode === "string" ? saved.currentColorMode : "blur";
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-color-mode", colorMode);

        const logoImg = document.getElementById("logoImg");
        if (logoImg) {
            logoImg.src = resolveWordmarkSrc(colorMode, currentLanguage);
        }

        loadGlobalLeaderboard();
	</script>
    <script src="../scripts/pwa-register.js"></script>
</body>
